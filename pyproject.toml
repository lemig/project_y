[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project_y"
version = "0.0.0"
description = "Audit-grade AI investigator on OpenAleph + FtM (OLAF-internal)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    # httpx is BSD-3-Clause — compatible with both EUPL v1.2 and Apache 2.0
    # (the two licenses we may publish under). Required by src/aleph/client.py.
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agent", "src/aleph", "src/schema", "src/skills"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
# Integration tests hit the local Aleph dev stack (bin/dev-up). Run them
# explicitly with `pytest -m integration`; default runs exclude them.
addopts = "-m 'not integration'"
markers = [
    "integration: hits the local Aleph dev stack (skipped unless -m integration)",
]
